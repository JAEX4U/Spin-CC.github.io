<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Card Shop</title>

<link rel="stylesheet" href="style.css">

<style>

/* Page style */
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}

/* Navbar */
nav{
    background:#020617;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 20px;
    text-decoration:none;
    font-weight:bold;
}

/* Shop container */
.shop-container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    margin-top:80px;
    flex-wrap:wrap;
}

/* Gift card box */
.gift-card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    width:220px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.5);
    transition:0.3s;
}

.gift-card:hover{
    transform:scale(1.05);
}

/* Button */
.gift-card button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="support.html">Support</a>
</nav>

<!-- Gift Cards -->
<div class="shop-container">

<div class="gift-card">
<h3>Amazon $10</h3>
<p>Price: $9</p>
<button>Buy Now</button>
</div>

<div class="gift-card">
<h3>Google Play $10</h3>
<p>Price: $9</p>
<button>Buy Now</button>
</div>

<div class="gift-card">
<h3>Steam $10</h3>
<p>Price: $9</p>
<button>Buy Now</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
