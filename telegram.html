<!DOCTYPE html>
<html>
<head>
  <title>Telegram</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <h2>SPIN Store</h2>
  <div class="nav-boxes">
    <div class="nav-box" onclick="goPage('index.html')">Home</div>
    <div class="nav-box" onclick="goPage('rule.html')">Rules</div>
    <div class="nav-box" onclick="goPage('telegram.html')">Telegram</div>
  </div>
</nav>

<header>

  <!-- TELEGRAM LOGO -->
  <div class="telegram-logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
  </div>

  <h1> Connect with Us</h1>
  <p>Choose how you want to join</p>
</header>

<div class="container">

  <div class="card">
    <h3>Chat Support</h3>
    <p class="subtitle">Talk directly with Admin</p>
    <button onclick="openChat()">Open Chat</button>
  </div>

  <div class="card">
    <h3>Join Channel</h3>
    <p class="subtitle">Get updates & offers</p>
    <button onclick="openChannel()">Join Channel</button>
  </div>

</div>

<footer>© 2026 Gift Store</footer>

<script>
function goPage(p){
  window.location.href = p;
}

function openChat(){
  window.open("https://t.me/Spin011_cc","_blank");
}

function openChannel(){
  window.open("https://t.me/YOUR_CHANNEL_LINK","_blank");
}
</script>

</body>
</html>
