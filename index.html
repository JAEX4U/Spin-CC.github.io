<!DOCTYPE html>
<html>
<head>
  <title>Gift Card Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
function goPage(p){
  window.location.href = p;
}

function openTelegramMenu(){
  let choice = prompt(
    "Choose option:\n1 - Chat with us\n2 - Join Channel"
  );

  if(choice == "1"){
    window.open("https://t.me/Spin011_cc", "_blank");
  }
  else if(choice == "2"){
    window.open("https://t.me/YOUR_CHANNEL_LINK", "_blank");
  }
}
</script>  

  <nav>
  <h2>🎁 Gift Store</h2>
  <div class="nav-boxes">
    <div class="nav-box" onclick="goPage('index.html')">🏠 Home</div>
    <div class="nav-box" onclick="openTelegramMenu()">💬 Telegram</div>
  </div>
</nav>

<header>
  <h1>🔥 Premium Gift Cards</h1>
  <p>Trusted • Fast Delivery • Secure Deals</p>
</header>

<div class="category-buttons">
  <button onclick="filterCategory('D')">D Cards</button>
  <button onclick="filterCategory('C')">C Cards</button>
  <button onclick="filterCategory('NFC')">NFC Cards</button>
  <button onclick="filterCategory('OTP')">OTP Cards</button>
</div>

<div class="container" id="products"></div>

<footer>© 2026 Gift Store</footer>

<script src="script.js"></script>
</body>
</html>
