<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GiftCardHub</title>

</head>

<body>

<header>

<div class="product">

<p>© 2026 GiftCardHub</p>
</footer>

<script src="script.js"></script>

</html>
