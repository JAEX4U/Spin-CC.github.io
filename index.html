<!DOCTYPE html>
<html>
<head>
  <title>Gift Card Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP MENU -->
<nav>
  <h2>🎁 Gift Store</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="support.html">Support</a>
    <a href="updates.html">Updates</a>
    <a href="terms.html">Terms</a>
  </div>
</nav>

<header>
  <h1>🔥 Premium Gift Cards</h1>
  <p>Trusted • Fast Delivery • Secure Deals</p>
</header>

<!-- MENU BOXES (WITHOUT HOME) -->
<div class="page-boxes">

  <div class="box" onclick="goPage('support.html')">
    <h3>📞 Support</h3>
    <p>Get help instantly</p>
  </div>

  <div class="box" onclick="goPage('updates.html')">
    <h3>📢 Updates</h3>
    <p>Latest news & offers</p>
  </div>

  <div class="box" onclick="goPage('terms.html')">
    <h3>📜 Terms</h3>
    <p>Read our policies</p>
  </div>

</div>

<!-- CATEGORY BUTTONS -->
<div class="category-buttons">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('D')">D Cards</button>
  <button onclick="filterCategory('C')">C Cards</button>
  <button onclick="filterCategory('NFC')">NFC Cards</button>
  <button onclick="filterCategory('OTP')">OTP Cards</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<footer>
  © 2026 Gift Store • Powered by Telegram Orders
</footer>

<script src="script.js"></script>
</body>
</html>
