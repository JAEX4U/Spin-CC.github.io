<!DOCTYPE html>
<html>
<head>
  <title>Gift Card Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAV WITH BOXES -->
<nav>
  <h2>🎁 Gift Store</h2>

  <div class="nav-boxes">
    <div class="nav-box" onclick="goPage('index.html')">🏠 Home</div>
    <div class="nav-box" onclick="goPage('support.html')">📞 Support</div>
    <div class="nav-box" onclick="goPage('updates.html')">📢 Updates</div>
    <div class="nav-box" onclick="goPage('terms.html')">📜 Terms</div>
  </div>

</nav>

<header>
  <h1>🔥 Premium Gift Cards</h1>
  <p>Trusted • Fast Delivery • Secure Deals</p>
</header>

<!-- CATEGORY BUTTONS -->
<div class="category-buttons">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('D')">D Cards</button>
  <button onclick="filterCategory('C')">C Cards</button>
  <button onclick="filterCategory('NFC')">NFC Cards</button>
  <button onclick="filterCategory('OTP')">OTP Cards</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<footer>
  © 2026 Gift Store • Powered by Telegram Orders
</footer>

<script src="script.js"></script>
